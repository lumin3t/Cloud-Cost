events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;
    upstream backend {
        server backend:8000;
    }

    server {
        listen 80;
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }
        location /api/ {
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://backend;
        }
    }
}